# ai-mirror C++ project pre-commit config
# Auto-installed by scripts/setup-hooks.sh

repos:
  # General hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-case-conflict

  # C++ formatting
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v19.1.7
    hooks:
      - id: clang-format
        types_or: [c++, c]
        args: ['--style=file']

  # CMake formatting
  - repo: https://github.com/cheshirekow/cmake-format-precommit
    rev: v0.6.13
    hooks:
      - id: cmake-format
        types: [file]
        files: \.(cmake|CMakeLists\.txt)$

  # Post-merge hook: auto-install after git pull
  - repo: local
    hooks:
      - id: post-merge-install
        name: post-merge install dependencies
        entry: scripts/post-merge-hook.sh
        language: script
        stages: [post-merge]
        always_run: true
