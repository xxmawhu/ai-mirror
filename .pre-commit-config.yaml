repos:
  - repo: local
    hooks:
      - id: check-file-size
        name: Check file size (max 50MB)
        entry: >
          bash -c '
            max_size=$((50 * 1024 * 1024));
            for f in "$@"; do
              if [ -f "$f" ]; then
                size=$(stat -c%s "$f" 2>/dev/null || stat -f%z "$f" 2>/dev/null);
                if [ "$size" -gt "$max_size" ]; then
                  echo "Error: $f is larger than 50MB (size: $size bytes)";
                  exit 1;
                fi;
              fi;
            done
          ' --
        language: system
        types: [file]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.9
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
