# ai-mirror C++ project pre-commit config
# Auto-installed by scripts/setup-hooks.sh

# Exclude vendored dependencies from all hooks
exclude: ^third_party/

repos:
  # General hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        stages: [pre-commit]
      - id: end-of-file-fixer
        stages: [pre-commit]
      - id: check-yaml
        stages: [pre-commit]
      - id: check-json
        stages: [pre-commit]
      - id: check-merge-conflict
        stages: [pre-commit]
      - id: check-added-large-files
        stages: [pre-commit]
        args: ['--maxkb=500']
      - id: check-case-conflict
        stages: [pre-commit]

  # C++ formatting
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v19.1.7
    hooks:
      - id: clang-format
        stages: [pre-commit]
        types_or: [c++, c]
        args: ['--style=file']

  # CMake formatting
  - repo: https://github.com/cheshirekow/cmake-format-precommit
    rev: v0.6.13
    hooks:
      - id: cmake-format
        stages: [pre-commit]
        types: [file]
        files: \.(cmake|CMakeLists\.txt)$

  # Post-merge hook: auto-install after git pull
  - repo: local
    hooks:
      - id: post-merge-install
        name: post-merge install dependencies
        entry: bash scripts/post-merge-hook.sh
        language: system
        stages: [post-merge]
        always_run: true
        pass_filenames: false

# REMOVED: check-file-permissions (violates platform permission-handling Rule 3)
# Source file permissions are managed by system admin, not by code hooks
# See: permission-handling skill - "禁止 chmod/chown"
# Violation: scripts/check-file-permissions.sh forced chmod 600 on source files
